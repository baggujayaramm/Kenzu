version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: antigravity_db
    restart: always
    environment:
      POSTGRES_USER: antigravity_user
      POSTGRES_PASSWORD: antigravity_password
      POSTGRES_DB: antigravity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
